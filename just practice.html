<!DOCTYPE html>
<html>
<head>
    <title>Anmol's Website</title>

    <style>
        body {
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
        }

        .container {
            background: white;
            width: 60%;
            margin: 50px auto;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            color: darkblue;
        }

        h2 {
            margin-top: 30px;
            color: #007bff;
        }

        p {
            font-size: 18px;
            color: #333;
        }

        hr {
            margin: 25px 0;
        }

        img {
            margin-top: 15px;
            border-radius: 10px;
            width: 250px;
        }

        a {
            display: inline-block;
            margin-top: 15px;
            background-color: #007bff;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        a:hover {
            background-color: #0056b3;
        }

        .navbar {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }

        .navbar a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            background: none;
            padding: 0;
        }

        .navbar a:hover {
            color: yellow;
        }
    </style>

</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <a href="#">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </div>

        <p><b>Home Country:</b> Nepal</p>
        <p><b>Currently Studying:</b> Australia</p>

        <hr>

        <!-- CONTACT SECTION -->
        <h2 id="contact">Contact</h2>
        <p><b>Email:</b> rawotanmol@gmail.com</p>

    </div>

</body>
</html>
